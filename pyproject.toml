[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["app", "core"]

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
ignore_missing_imports = true
exclude = ["venv", ".venv", "tests"]
mypy_path = "apps/api"
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["app.models.*"]
disable_error_code = ["misc", "call-arg"]

[tool.pytest.ini_options]
testpaths = ["apps/api/tests"]
pythonpath = ["apps/api"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 88
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.isort]
known-first-party = ["apps.api"]

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
ignore_missing_imports = true
exclude = ["venv", ".venv", "tests"]

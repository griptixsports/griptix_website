name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "render.yaml"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        env:
          SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_TOKEN }}
        run: |
          PAYLOAD='{"clearCache": false}'
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Deploy failed — check RENDER_SERVICE_ID and RENDER_TOKEN"
            exit 1
          fi

      - name: Wait for deploy to complete
        run: |
          echo "Deploy triggered. Monitor at: https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}/deploys"

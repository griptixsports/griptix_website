services:
  - type: web
    name: griptix-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      # Set these in Render Dashboard → Environment → Secret Files / Env Vars:
      - key: DATABASE_URL
        sync: false
      - key: ALEMBIC_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_UPLOADS_BUCKET
        value: griptix-uploads
      - key: R2_MEDIA_BUCKET
        value: griptix-media
      - key: R2_MEDIA_PUBLIC_URL
        value: https://media.griptix.in
      - key: S3_PRESIGNED_URL_EXPIRE_SECONDS
        value: "900"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        value: orders@mail.griptix.in
      - key: BREVO_FROM_NAME
        value: Griptix
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: HF_API_KEY
        sync: false
      - key: HF_EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://cloud.langfuse.com
      - key: LANGFUSE_PROJECT_NAME
        value: griptix-agents
      - key: SENTRY_DSN_BACKEND
        sync: false
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://griptix.in,https://www.griptix.in
      - key: FEATURE_WHATSAPP_ENABLED
        value: "false"
      - key: FEATURE_AI_SIZING_VALIDATION
        value: "false"
      - key: FEATURE_SEMANTIC_SEARCH
        value: "false"
      - key: FEATURE_PARTNER_PORTAL
        value: "false"
      - key: FEATURE_BLOG_CMS
        value: "false"
